<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>完全版ガチャシミュレーター | Afterwork Lab</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS（キャッシュ対策） -->
  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

  <!-- タブ（キャラ／武器） -->
  <header id="banner-tabs"></header>

  <!-- ゲーム選択 -->
  <section id="game-select"></section>

  <!-- 所持リソース -->
  <section id="resources"></section>

  <!-- 現在のガチャ状況（※UI.js 内で future-body に統合済み） -->
  <section id="current-state"></section>

  <!-- 未来の石（詳細設定） -->
  <section id="future-resources"></section>

  <!-- シミュレーション精度 -->
  <section id="simulation-settings"></section>

  <!-- 計算ボタン -->
  <section id="run-button"></section>

  <!-- 結果 -->
  <section id="results"></section>

  <!-- フッターロゴ -->
  <footer class="footer-logo">
    <a href="/" class="footer-logo-link">
      <img src="logo.png" alt="Afterwork Lab ロゴ">
    </a>
    <div class="copyright">
      © 2026 Afterwork Lab All Rights Reserved.
    </div>
  </footer>

  <!-- JS（キャッシュ対策 & 読み込み順の最適化） -->
  <script src="config.js?v=2"></script>
  <script src="gacha.js?v=2"></script>
  <script src="ui.js?v=2"></script>

</body>
</html>
